<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATX Corrective Action Form</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D2D53;
    --navy-light: #1a3d6b;
    --green: #A3F3C5;
    --green-dark: #2ecc71;
    --bg: #f4f6f9;
    --card: #ffffff;
    --border: #dde2ea;
    --text: #1a2233;
    --muted: #6b7a8f;
    --danger: #e24b4a;
    --success: #1D9E75;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  header {
    background: var(--navy);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 18px;
    color: var(--green);
    letter-spacing: 2px;
  }
  .header-title {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 36px 20px;
  }
  .sheet-url-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sheet-url-bar label {
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  .sheet-url-bar input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
  }
  .sheet-url-bar input:focus { outline: 2px solid var(--green); border-color: transparent; }
  .save-btn-sm {
    background: var(--navy);
    color: var(--green);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .save-btn-sm:hover { background: var(--navy-light); }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .section-header {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-num {
    background: var(--green);
    color: var(--navy);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .section-title {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .section-body {
    padding: 24px;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }
  .row.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .field label span.req { color: var(--danger); }
  .field input, .field select, .field textarea {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(13,45,83,0.08);
  }
  .field textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    user-select: none;
  }
  .check-item:hover { border-color: var(--navy); background: #eef1f7; }
  .check-item input[type="checkbox"] { accent-color: var(--navy); width: 14px; height: 14px; }
  .check-item input[type="radio"] { accent-color: var(--navy); width: 14px; height: 14px; }
  .other-input {
    display: none;
    margin-top: 8px;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
  }
  .other-input.show { display: block; }
  .action-table { width: 100%; border-collapse: collapse; }
  .action-table th {
    background: var(--bg);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .action-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .action-table td:first-child {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 32px;
    text-align: center;
  }
  .action-table input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--text);
  }
  .action-table input:focus { outline: none; border-color: var(--navy); }
  .radio-group { display: flex; gap: 10px; }
  .radio-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    background: var(--bg);
    transition: all 0.15s;
  }
  .radio-item:hover { border-color: var(--navy); background: #eef1f7; }
  .radio-item input { accent-color: var(--navy); }
  .ack-section {
    background: #f8f9fb;
    border-top: 1px solid var(--border);
    padding: 24px;
  }
  .submit-bar {
    padding: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .submit-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .submit-btn {
    background: var(--navy);
    color: var(--green);
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .submit-btn:hover { background: var(--navy-light); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .toast.success { background: var(--success); color: #fff; display: flex; align-items: center; gap: 8px; }
  .toast.error { background: var(--danger); color: #fff; display: flex; align-items: center; gap: 8px; }
  .success-banner {
    display: none;
    background: #e8f9f2;
    border: 1px solid #9fe1cb;
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 28px;
    text-align: center;
  }
  .success-banner.show { display: block; }
  .success-banner h3 { color: var(--success); font-size: 16px; margin-bottom: 6px; }
  .success-banner p { color: #2a7a5a; font-size: 13px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  @media (max-width: 600px) {
    .row { grid-template-columns: 1fr; }
    .row.three { grid-template-columns: 1fr; }
    .submit-bar { flex-direction: column; }
    .container { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ATX</div>
    <div class="header-title">Corrective Action Report</div>
  </div>
</header>

<div class="container">



  <div class="success-banner" id="successBanner">
    <h3>✓ Corrective Action Submitted</h3>
    <p>This form has been logged to the ATX CAR Google Sheet.</p>
  </div>

  <form id="carForm">

    <!-- Section 1: Error Details -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">1</div>
        <div class="section-title">Error Details</div>
      </div>
      <div class="section-body">
        <div class="row three">
          <div class="field">
            <label>Date <span class="req">*</span></label>
            <input type="date" id="errorDate" required />
          </div>
          <div class="field">
            <label>Facility <span class="req">*</span></label>
            <select id="facility" required>
              <option value="">Select...</option>
              <option>MKE</option>
              <option>SLC</option>
              <option>BAL</option>
            </select>
          </div>
          <div class="field">
            <label>Shift</label>
            <select id="shift">
              <option value="">Select...</option>
              <option>AM</option>
              <option>PM</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Reported By <span class="req">*</span></label>
            <input type="text" id="reportedBy" placeholder="Name" required />
          </div>
          <div class="field">
            <label>Department <span class="req">*</span></label>
            <select id="department" required>
              <option value="">Select...</option>
              <option>Inbound</option>
              <option>Outbound</option>
              <option>Kitting</option>
              <option>Inventory</option>
              <option>B2B</option>
              <option>Returns</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Employee Who Caused Error</label>
            <input type="text" id="employee" placeholder="Leave blank if unknown" />
          </div>
          <div class="field">
            <label>Client</label>
            <input type="text" id="client" placeholder="Client name" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Order #</label>
            <input type="text" id="orderNum" placeholder="Order number" />
          </div>
          <div class="field">
            <label>SKU / Item</label>
            <input type="text" id="sku" placeholder="SKU or item description" />
          </div>
        </div>

        <div class="divider"></div>

        <div class="field">
          <label>Error Type <span class="req">*</span></label>
          <div class="checkbox-group" id="errorTypeGroup">
            <label class="check-item"><input type="checkbox" name="errorType" value="Mispick - Wrong Item"> Mispick / Wrong Item</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Packout Error"> Packout Error</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Wrong Qty"> Wrong Qty</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Wrong Label"> Wrong Label</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Damaged Goods"> Damaged Goods</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="LOT / FEFO"> LOT / FEFO</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Receiving Error"> Receiving Error</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Inventory Count"> Inventory Count</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Kit Build Error"> Kit Build Error</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Carrier / Shipping"> Carrier / Shipping</label>
            <label class="check-item"><input type="checkbox" name="errorType" value="Other" id="errorTypeOtherCheck"> Other</label>
          </div>
          <input type="text" class="other-input" id="errorTypeOther" placeholder="Describe other error type..." />
        </div>

        <div class="divider"></div>

        <div class="field">
          <label>How Discovered</label>
          <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" name="discovered" value="Client Report"> Client Report</label>
            <label class="check-item"><input type="checkbox" name="discovered" value="Internal Catch"> Internal Catch</label>
            <label class="check-item"><input type="checkbox" name="discovered" value="End Customer"> End Customer</label>
            <label class="check-item"><input type="checkbox" name="discovered" value="Carrier"> Carrier</label>
            <label class="check-item"><input type="checkbox" name="discovered" value="Manager Review"> Manager Review</label>
          </div>
        </div>

        <div class="divider"></div>

        <div class="row full">
          <div class="field">
            <label>Description of Error <span class="req">*</span></label>
            <textarea id="errorDescription" placeholder="What happened? What was expected vs. what actually occurred?" required></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 2: Root Cause -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">2</div>
        <div class="section-title">Root Cause</div>
      </div>
      <div class="section-body">
        <div class="field" style="margin-bottom: 16px;">
          <label>Root Cause Category</label>
          <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" name="rootCause" value="Process / SOP Gap"> Process / SOP Gap</label>
            <label class="check-item"><input type="checkbox" name="rootCause" value="Training / Knowledge"> Training / Knowledge</label>
            <label class="check-item"><input type="checkbox" name="rootCause" value="System / WMS"> System / WMS</label>
            <label class="check-item"><input type="checkbox" name="rootCause" value="Labeling / Slotting"> Labeling / Slotting</label>
            <label class="check-item"><input type="checkbox" name="rootCause" value="Staffing / Attention"> Staffing / Attention</label>
            <label class="check-item"><input type="checkbox" name="rootCause" value="Other" id="rootCauseOtherCheck"> Other</label>
          </div>
          <input type="text" class="other-input" id="rootCauseOther" placeholder="Describe other root cause..." />
        </div>
        <div class="row full">
          <div class="field">
            <label>Root Cause Explanation</label>
            <textarea id="rootCauseExplanation" placeholder="Explain in plain language why this error occurred..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 3: Corrective Actions -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">3</div>
        <div class="section-title">Corrective Actions</div>
      </div>
      <div class="section-body">
        <table class="action-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Action Step</th>
              <th style="width: 160px;">Owner</th>
              <th style="width: 160px;">Due Date / Status</th>
            </tr>
          </thead>
          <tbody id="actionRows">
            <tr>
              <td>1</td>
              <td><input type="text" placeholder="Describe action..." /></td>
              <td><input type="text" placeholder="Owner" /></td>
              <td><input type="text" placeholder="Date / Status" /></td>
            </tr>
            <tr>
              <td>2</td>
              <td><input type="text" placeholder="Describe action..." /></td>
              <td><input type="text" placeholder="Owner" /></td>
              <td><input type="text" placeholder="Date / Status" /></td>
            </tr>
            <tr>
              <td>3</td>
              <td><input type="text" placeholder="Describe action..." /></td>
              <td><input type="text" placeholder="Owner" /></td>
              <td><input type="text" placeholder="Date / Status" /></td>
            </tr>
            <tr>
              <td>4</td>
              <td><input type="text" placeholder="Describe action..." /></td>
              <td><input type="text" placeholder="Owner" /></td>
              <td><input type="text" placeholder="Date / Status" /></td>
            </tr>
          </tbody>
        </table>
        <div class="divider"></div>
        <div class="row">
          <div class="field">
            <label>SOP Update Required?</label>
            <div class="radio-group">
              <label class="radio-item"><input type="radio" name="sopUpdate" value="Yes"> Yes</label>
              <label class="radio-item"><input type="radio" name="sopUpdate" value="No" checked> No</label>
            </div>
          </div>
          <div class="field">
            <label>Retraining Required?</label>
            <div class="radio-group">
              <label class="radio-item"><input type="radio" name="retrain" value="Yes"> Yes</label>
              <label class="radio-item"><input type="radio" name="retrain" value="No" checked> No</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 4: Acknowledgment -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">4</div>
        <div class="section-title">Acknowledgment</div>
      </div>
      <div class="ack-section">
        <div class="row">
          <div class="field">
            <label>Employee Name (Print)</label>
            <input type="text" id="empName" placeholder="Full name" />
          </div>
          <div class="field">
            <label>Department Manager (Print) <span class="req">*</span></label>
            <input type="text" id="managerName" placeholder="Full name" required />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Acknowledgment Date</label>
            <input type="date" id="ackDate" />
          </div>
          <div class="field">
            <label>Manager Title</label>
            <input type="text" id="managerTitle" placeholder="e.g. AM Outbound Lead" />
          </div>
        </div>
      </div>
      <div class="submit-bar">
        <div class="submit-note">This form will be logged to the ATX CAR Google Sheet as a new row.</div>
        <button type="submit" class="submit-btn" id="submitBtn">Submit Corrective Action →</button>
      </div>
    </div>

  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  const TODAY = new Date().toISOString().split('T')[0];
  document.getElementById('errorDate').value = TODAY;
  document.getElementById('ackDate').value = TODAY;

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKvsZ-vkW9D7ErswklQ_uiVTV2bWLVeZ0knj4ZKzyIjByHn8m_xbssiF_0mFknLGA45A/exec';

  document.getElementById('errorTypeOtherCheck').addEventListener('change', function() {
    document.getElementById('errorTypeOther').classList.toggle('show', this.checked);
  });
  document.getElementById('rootCauseOtherCheck').addEventListener('change', function() {
    document.getElementById('rootCauseOther').classList.toggle('show', this.checked);
  });

  function getChecked(name) {
    return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i => i.value).join(', ');
  }

  function getActionRows() {
    const rows = document.querySelectorAll('#actionRows tr');
    return [...rows].map((row, i) => {
      const inputs = row.querySelectorAll('input');
      return {
        step: i + 1,
        action: inputs[0]?.value || '',
        owner: inputs[1]?.value || '',
        due: inputs[2]?.value || ''
      };
    }).filter(r => r.action.trim());
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'flex';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  document.getElementById('carForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const scriptUrl = SCRIPT_URL;
const errorTypes = getChecked('errorType');
    const otherError = document.getElementById('errorTypeOther').value;
    const rootCauses = getChecked('rootCause');
    const otherRoot = document.getElementById('rootCauseOther').value;
    const actions = getActionRows();

    const payload = {
      timestamp: new Date().toISOString(),
      errorDate: document.getElementById('errorDate').value,
      facility: document.getElementById('facility').value,
      shift: document.getElementById('shift').value,
      reportedBy: document.getElementById('reportedBy').value,
      department: document.getElementById('department').value,
      employee: document.getElementById('employee').value,
      client: document.getElementById('client').value,
      orderNum: document.getElementById('orderNum').value,
      sku: document.getElementById('sku').value,
      errorType: errorTypes + (otherError ? ' — ' + otherError : ''),
      discovered: getChecked('discovered'),
      errorDescription: document.getElementById('errorDescription').value,
      rootCauseCategory: rootCauses + (otherRoot ? ' — ' + otherRoot : ''),
      rootCauseExplanation: document.getElementById('rootCauseExplanation').value,
      actions: actions.map(a => `[${a.step}] ${a.action} | ${a.owner} | ${a.due}`).join('\n'),
      sopUpdate: document.querySelector('input[name="sopUpdate"]:checked')?.value || '',
      retrain: document.querySelector('input[name="retrain"]:checked')?.value || '',
      empName: document.getElementById('empName').value,
      managerName: document.getElementById('managerName').value,
      ackDate: document.getElementById('ackDate').value,
      managerTitle: document.getElementById('managerTitle').value,
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      document.getElementById('successBanner').classList.add('show');
      document.getElementById('carForm').reset();
      document.getElementById('errorDate').value = TODAY;
      document.getElementById('ackDate').value = TODAY;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showToast('CAR submitted successfully!', 'success');
    } catch (err) {
      showToast('Submission failed. Check your script URL.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Corrective Action →';
    }
  });
</script>
</body>
</html>
